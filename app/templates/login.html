{{define "login"}}<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>login</title><link rel="stylesheet" href="/static/css/style.css"></head><body><main class="container"><section class="card"><h1>вход только для своих</h1><p>если аккаунта нет — пиши главному, тут без случайных регистраций.</p>{{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}<form method="post" action="/login"><input type="hidden" name="csrf_token" value="{{.CSRF}}"><input name="username" placeholder="username" value="{{.Username}}"><input type="password" name="password" placeholder="password"><button class="btn btn-primary">войти</button></form></section></main></body></html>{{end}}
