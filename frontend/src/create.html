<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать ивент</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="top-nav">
    <a href="/static/index.html">← Отмена</a>
</nav>

<div class="container">
    <div class="card" style="max-width:700px;margin:40px auto;">
        <h1>Новое мероприятие</h1>

        <form id="create-form">
            <label for="title-input" style="position:absolute;left:-9999px;">Название</label>
            <input id="title-input" type="text" name="title" placeholder="Название" required>

            <label for="desc-input" style="position:absolute;left:-9999px;">Описание</label>
            <textarea id="desc-input" name="description" placeholder="Описание" rows="4" required></textarea>

            <label for="loc-input" style="position:absolute;left:-9999px;">Локация</label>
            <input id="loc-input" type="text" name="location" placeholder="Локация" required>

            <div class="form-row-2">
                <div>
                    <label for="start-input" class="text-muted" style="font-size:0.9rem;">Начало</label>
                    <input id="start-input" type="datetime-local" name="start_date" required>
                </div>
                <div>
                    <label for="end-input" class="text-muted" style="font-size:0.9rem;">Окончание</label>
                    <input id="end-input" type="datetime-local" name="end_date" required>
                </div>
            </div>

            <div class="form-row-2">
                <div>
                    <label for="deadline-input" class="text-muted" style="font-size:0.9rem;">Дедлайн регистрации</label>
                    <input id="deadline-input" type="datetime-local" name="registration_deadline">
                </div>
                <div>
                    <label for="max-input" class="text-muted" style="font-size:0.9rem;">Макс. участников (0=∞)</label>
                    <input id="max-input" type="number" name="max_participants" min="0" value="0">
                </div>
            </div>

            <div class="form-row-2">
                <div>
                    <label for="sp-input" class="text-muted" style="font-size:0.9rem;">SP за участие</label>
                    <input id="sp-input" type="number" name="skill_points" min="0" required>
                </div>
                <div>
                    <label for="reserve-input" class="text-muted" style="font-size:0.9rem;">Резерв</label>
                    <input id="reserve-input" type="number" name="reserve_participants" min="0" value="0">
                </div>
            </div>

            <div class="file-input">
                <label for="img-input" class="text-muted" style="display:block;margin-bottom:8px;">Обложка мероприятия</label>
                <input id="img-input" type="file" accept="image/*"
                       data-crop-kind="event"
                       data-crop-hidden="#cropped-image"
                       data-crop-preview="#image-preview">
                <!-- Сюда кроппер запишет base64-строку -->
                <input type="hidden" id="cropped-image">
                <img id="image-preview" class="upload-preview" src="" alt="Превью обложки" style="display:none;">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">
                Опубликовать
            </button>
        </form>
    </div>
</div>

<script src="/static/api.js"></script>
<script src="/static/cropper.js"></script>
<script>
    (async () => {
        /** @type {User} */
        const u = await requireAuth();
        if (!u || (u.Role !== 'Admin' && u.Role !== 'Organizer')) {
            alert('Недостаточно прав');
            redirect('/static/index.html');
        }
    })();

    document.getElementById('create-form').addEventListener('submit', async e => {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector('button');
        btn.textContent = 'Создаём...';
        btn.disabled = true;

        try {
            // Собираем данные в JSON-объект (НЕ FormData!)
            const body = {
                title: form.title.value,
                description: form.description.value,
                location: form.location.value,
                start_date: toRFC3339(form.start_date.value),
                end_date: toRFC3339(form.end_date.value),
                skill_points: parseInt(form.skill_points.value) || 0,
                reserve_participants: parseInt(form.reserve_participants.value) || 0,
                max_participants: parseInt(form.max_participants.value) || null,
            };

            if (form.registration_deadline.value) {
                body.registration_deadline = toRFC3339(form.registration_deadline.value);
            }

            // Берём base64-строку от кроппера (если есть)
            const croppedImage = document.getElementById('cropped-image').value;
            if (croppedImage) {
                body.image = croppedImage; // ← вот она летит в бэкенд как строка
            }

            // Отправляем JSON
            await api('/events', { method: 'POST', body });

            alert('Мероприятие создано!');
            redirect('/static/index.html');
        } catch (err) {
            alert('Ошибка: ' + err.message);
            btn.textContent = 'Опубликовать';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
