<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Вход</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="container">
    <div class="card" style="max-width:400px;margin:100px auto;text-align:center;">
        <h1>Вход в систему</h1>
        <p class="text-muted" style="margin-bottom:24px;">Только для своих</p>
        <form id="login-form">
            <label for="login-input" style="position:absolute;left:-9999px;">Логин</label>
            <input id="login-input" type="text" name="login" placeholder="Логин" required autocomplete="username">
            <label for="password-input" style="position:absolute;left:-9999px;">Пароль</label>
            <input id="password-input" type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">Войти</button>
        </form>
        <p class="text-muted" style="margin-top:16px;font-size:0.9rem;">Нет аккаунта? <a href="/static/register.html" style="color:var(--accent-light);">Зарегистрироваться</a></p>
    </div>
</div>
<script src="/static/api.js"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const form = e.target, btn = form.querySelector('button');
        btn.textContent = 'Входим...'; btn.disabled = true;
        try {
            /** @type {TokenResponse} */
            const res = await api('/auth/login', { method:'POST', body:{ login: form.login.value, password: form.password.value } });
            if (!res.token) {
                showFormError('login-form', 'Токен не получен');
                btn.textContent = 'Войти';
                btn.disabled = false;
                return;
            }
            localStorage.setItem('token', res.token);
            redirect('/static/index.html');
        } catch(err) {
            showFormError('login-form', err.message);
            btn.textContent='Войти';
            btn.disabled=false;
        }
    });
</script>
</body></html>
