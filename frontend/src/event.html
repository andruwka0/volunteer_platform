<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ивент</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="top-nav">
    <a href="/static/index.html">← Назад</a>
    <a href="/static/index.html">Ивенты</a>
    <a href="/static/create.html">Создать</a>
    <a href="/static/profile.html">Профиль</a>
    <a href="/static/admin.html">Админка</a>
    <button id="logout-btn" class="btn btn-secondary nav-logout">Выйти</button>
</nav>

<div class="container">
    <div id="event-detail"></div>
    <div class="card" style="margin-top:20px;">
        <h3>Регистрация</h3>
        <div id="reg-status"></div>
    </div>
    <div class="card" style="margin-top:20px;">
        <h3>Участники</h3>
        <div id="participants-list"></div>
    </div>
</div>

<script src="/static/api.js"></script>
<script>
    (async () => {
        /** @type {User} */
        const user = await requireAuth();
        if (!user) return;

        const id = getParam('id');
        if (!id) redirect('/static/index.html');

        /** @type {Event} */
        const event = await api(`/events/${id}`);
        /** @type {{event_id: number, participants: number[], count: number}} */
        const participantsData = await api(`/events/${id}/participants`);
        const participants = participantsData.participants || [];

        // Обложка
        const cover = event.CoverImageURL || '/static/placeholder.svg';

        // Статус
        const statusMap = {
            'EVENT-RECRUITING': { text: '🟢 Набор открыт', cls: 'badge-success' },
            'EVENT-ACTIVE':     { text: '🔵 Активно',      cls: 'badge' },
            'EVENT-FINISHED':   { text: '⚫ Завершено',    cls: 'badge' },
            'EVENT-CLOSED':     { text: '✅ Закрыто',      cls: 'badge' },
            'EVENT-CANCELLED':  { text: '🔴 Отменено',     cls: 'badge' },
        };
        const statusInfo = statusMap[event.Status] || { text: event.Status, cls: 'badge' };

        // Рендер деталей ивента
        document.getElementById('event-detail').innerHTML = `
    <div class="card">
      <div class="event-avatar" style="background:url('${cover}') center/cover; width:100%; height:300px; margin-bottom:20px;" role="img" aria-label="Обложка мероприятия"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <h1>${event.Title}</h1>
        <div style="display:flex;gap:10px;align-items:center;">
          <span class="badge ${statusInfo.cls}">${statusInfo.text}</span>
          <div class="organizer-chip">SP: ${event.SkillPoints}</div>
        </div>
      </div>
      <p style="margin-top:16px;line-height:1.6;">${event.Description || ''}</p>
      <div class="grid" style="grid-template-columns:repeat(3,1fr);margin-top:20px;">
        <div class="card"><b class="text-muted">Локация</b><p>${event.Location || 'Не указана'}</p></div>
        <div class="card"><b class="text-muted">Начало</b><p>${new Date(event.StartDate).toLocaleString('ru')}</p></div>
        <div class="card"><b class="text-muted">Конец</b><p>${new Date(event.EndDate).toLocaleString('ru')}</p></div>
      </div>
      ${event.RegistrationDeadline ? `
        <div class="event-registration-deadline" style="margin-top:16px;">
          Регистрация до: <b>${new Date(event.RegistrationDeadline).toLocaleString('ru')}</b>
        </div>
      ` : ''}
    </div>`;

        // Блок регистрации
        const regDiv = document.getElementById('reg-status');
        const isOrg = event.CreatedByID === user.ID;

        if (isOrg) {
            regDiv.innerHTML = '<p class="text-muted">Вы организатор этого мероприятия</p>';
        }
        else if (event.Status === 'EVENT-CANCELLED') {
            regDiv.innerHTML = '<p class="text-muted" style="color:#ff6b6b;">Мероприятие отменено</p>';
        }
        else if (event.Status === 'EVENT-FINISHED' || event.Status === 'EVENT-CLOSED') {
            regDiv.innerHTML = '<p class="text-muted">Мероприятие завершено</p>';
        }
        else if (event.Status !== 'EVENT-RECRUITING') {
            regDiv.innerHTML = '<p class="text-muted">Регистрация закрыта</p>';
        }
        else {
            const isReg = participants.includes(user.ID);
            regDiv.innerHTML = `
      <button id="btn-reg" class="btn btn-primary" style="display:${isReg?'none':''}">Записаться</button>
      <button id="btn-cancel" class="btn btn-secondary" style="display:${isReg?'inline-block':'none'};margin-left:10px;">Отменить</button>`;

            document.getElementById('btn-reg').onclick = async () => {
                try {
                    await api(`/events/${id}/register`, { method: 'POST' });
                    alert('Вы успешно зарегистрированы!');
                    location.reload();
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            };

            document.getElementById('btn-cancel').onclick = async () => {
                if (confirm('Вы уверены, что хотите отменить регистрацию?')) {
                    try {
                        await api(`/events/${id}/register`, { method: 'DELETE' });
                        alert('Регистрация отменена');
                        location.reload();
                    } catch (err) {
                        alert('Ошибка: ' + err.message);
                    }
                }
            };
        }

        // Блок участников
        const pList = document.getElementById('participants-list');
        const maxP = event.MaxParticipants;
        const reserve = event.ReserveParticipants || 0;

        let pHtml = `<p class="text-muted">
            Всего участников: ${participantsData.count}${maxP ? ` / ${maxP}` : ''}
            ${reserve > 0 ? ` · Резерв: ${event.ReserveCount || 0} / ${reserve}` : ''}
        </p>`;

        if (participants.length) {
            pHtml += participants.map(pid =>
                `<div class="card" style="padding:10px;"><b>Участник #${pid}</b></div>`
            ).join('');
        } else {
            pHtml += '<p class="text-muted">Пока нет участников</p>';
        }

        pList.innerHTML = pHtml;
    })();

    document.getElementById('logout-btn').onclick = () => {
        localStorage.removeItem('token');
        redirect('/static/login.html');
    };
</script>
</body>
</html>
