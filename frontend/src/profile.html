<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Профиль</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<nav class="top-nav">
    <a href="/static/index.html">Ивенты</a>
    <a href="/static/create.html">Создать</a>
    <a href="/static/profile.html">Профиль</a>
    <a href="/static/admin.html">Админка</a>
    <button id="logout-btn" class="btn btn-secondary nav-logout">Выйти</button>
</nav>
<div class="container">
    <div class="card profile-hero">
        <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="avatar-placeholder" style="background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:4rem;font-weight:900;" role="img" aria-label="Аватар">?</div>
        </div>
        <div class="profile-meta">
            <h2 id="user-full-name">Загрузка...</h2>
            <p class="text-muted" id="user-username">@...</p>
            <p id="user-role" class="badge">Volunteer</p>
        </div>
        <div class="profile-points card">
            <p class="text-muted">Skill Points</p>
            <div class="metric-number" id="user-points">0</div>
        </div>
    </div>
    <div class="card" style="margin-top:20px;">
        <h3>Информация</h3>
        <div class="profile-info-grid">
            <div class="profile-info-item"><b>Telegram</b><p id="user-telegram">Не указан</p></div>
            <div class="profile-info-item"><b>Логин</b><p id="user-login">...</p></div>
        </div>
    </div>
</div>
<script src="/static/api.js"></script>
<script>
    (async () => {
        /** @type {User} */
        const user = await requireAuth(); if (!user) return;
        const fn = user.FirstName || '';
        const ln = user.LastName || '';
        document.getElementById('user-full-name').textContent = `${fn} ${ln}`.trim() || 'Без имени';
        document.getElementById('user-username').textContent = `@${user.Login}`;
        document.getElementById('user-login').textContent = user.Login;
        document.getElementById('user-telegram').textContent = user.Telegram || 'Не указан';
        document.getElementById('user-points').textContent = (user.SkillPoints || 0).toString();
        document.getElementById('user-role').textContent = user.Role;
        document.getElementById('avatar-placeholder').textContent = (fn || user.Login || '?')[0].toUpperCase();
    })();
    document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('token'); redirect('/static/login.html'); };
</script>
</body></html>
